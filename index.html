<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCat首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #ffc0cb; /* 粉色背景 */
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* 透明圆润框 + 从下往上动画 */
        .round-box {
            position: absolute;
            top: 3%; /* 上移位置 */
            left: 5%;
            right: 5%;
            height: 20%; /* 缩小尺寸 */
            background: transparent;
            border-radius: 24px; /* 圆润圆角 */
            border: 1px solid rgba(255, 255, 255, 0.3); /* 透明边框 */
            /* 文字居中 */
            display: flex;
            align-items: center;
            justify-content: center;
            /* 核心动画：从下往上弹出 */
            animation: slideUp 1.2s ease-out forwards;
            /* 动画延迟，让效果更自然 */
            animation-delay: 0.2s;
        }
        /* 动画关键帧：从下往上 */
        @keyframes slideUp {
            0% {
                /* 初始位置：在屏幕下方外 */
                transform: translateY(100px);
                /* 初始透明 */
                opacity: 0;
            }
            100% {
                /* 目标位置：正常位置 */
                transform: translateY(0);
                /* 完全显示 */
                opacity: 1;
            }
        }
        /* 透明文字样式 + 同步动画 */
        .box-text {
            font-size: 36px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7); /* 透明文字 */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            /* 文字也跟随轻微动画，更协调 */
            animation: textFadeIn 1.4s ease-out forwards;
            animation-delay: 0.4s;
        }
        /* 文字淡入动画 */
        @keyframes textFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 0.7; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="round-box">
        <div class="box-text">若忘爱</div>
    </div>
</body>
</html>
